## ── DataSource ────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/search_platform
spring.datasource.username=postgres
spring.datasource.password=admin@123
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

## ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

## ── Server ────────────────────────────────────────────────────
server.port=8082

## ── JWT ───────────────────────────────────────────────────────
jwt.secret=MySuperSecretKeyForJWTAuthenticationPlatform2024
jwt.expiration=86400000

## ── Error handling — show structured JSON, hide stack traces ──
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

## ── Logging ───────────────────────────────────────────────────
logging.level.com.example.searchplatform=DEBUG
logging.level.org.springframework.security=INFO
